apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-devops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hello-devops

  template:
    metadata:
      labels:
        app: hello-devops

    spec:
      containers:
      - name: hello-devops

        image: hello-devops:v1

        imagePullPolicy: Never

        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: hello-service

spec:
  type: NodePort

  selector:
    app: hello-devops

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
